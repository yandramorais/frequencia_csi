<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Wi-Cardio — Relatório Metodológico</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; background: #f5f5f0; color: #1a1a1a; }
  #content { max-width: 860px; margin: 0 auto; padding: 48px 32px 80px; background: #fff; min-height: 100vh; box-shadow: 0 0 40px rgba(0,0,0,.08); }
  h1 { font-size: 1.9em; color: #0d3b6e; border-bottom: 3px solid #0d3b6e; padding-bottom: 12px; margin: 32px 0 16px; line-height: 1.3; }
  h2 { font-size: 1.35em; color: #1565c0; border-bottom: 1px solid #cde; padding-bottom: 6px; margin: 36px 0 14px; }
  h3 { font-size: 1.1em; color: #283593; margin: 26px 0 10px; }
  p  { line-height: 1.8; margin-bottom: 14px; }
  a  { color: #1565c0; }
  blockquote { border-left: 4px solid #1565c0; padding: 8px 16px; background: #eef4fb; margin: 16px 0; font-style: italic; color: #444; }
  blockquote p { margin: 0; }
  pre { background: #f6f8fa; border: 1px solid #dde; border-radius: 6px; padding: 16px; overflow-x: auto; margin: 16px 0; font-size: .88em; }
  code { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
  p code, li code { background: #eef; border-radius: 3px; padding: 1px 5px; font-size: .9em; color: #c7254e; }
  table { border-collapse: collapse; width: 100%; margin: 18px 0; font-size: .93em; }
  th { background: #1565c0; color: #fff; padding: 10px 14px; text-align: left; }
  td { padding: 9px 14px; border-bottom: 1px solid #e0e0e0; }
  tr:nth-child(even) td { background: #f0f6ff; }
  hr { border: none; border-top: 1px solid #ddd; margin: 32px 0; }
  ul, ol { margin: 10px 0 14px 24px; line-height: 1.8; }
  strong { color: #111; }
  em { color: #555; }
  #loading { text-align: center; padding: 80px; font-size: 1.2em; color: #888; }
</style>
</head>
<body>
<div id="content"><div id="loading">Carregando relatório...</div></div>
<script>
fetch('RELATORIO_METODOLOGICO.md')
  .then(r => r.text())
  .then(md => {
    marked.setOptions({ breaks: false, gfm: true });
    document.getElementById('content').innerHTML = marked.parse(md);
    document.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
    if (window.MathJax) MathJax.typesetPromise();
  });
</script>
</body>
</html>
